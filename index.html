<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DocMaker TH – ส.ไทยเจริญ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Prompt:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6fb;--sur:#fff;--sur2:#f0f3f9;--bdr:#e2e8f4;--acc:#2563eb;--acc2:#059669;--tx:#0f172a;--tx2:#64748b;--q:#7c3aed;--iv:#d97706;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}

/* SCREENS */
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.on{display:flex;}

/* HOME */
.hnav{background:var(--sur);border-bottom:1px solid var(--bdr);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:9;box-shadow:0 1px 8px rgba(0,0,0,.06);}
.logo{font-family:'Prompt',sans-serif;font-size:16px;font-weight:700;background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.btn-new{display:flex;align-items:center;gap:5px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border:none;border-radius:12px;padding:10px 18px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 2px 10px rgba(37,99,235,.3);}
.hbody{flex:1;padding:16px;max-width:640px;margin:0 auto;width:100%;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.scard{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:14px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.04);}
.snum{font-family:'Prompt',sans-serif;font-size:28px;font-weight:700;}
.snum.q{color:#7c3aed;}.snum.iv{color:#d97706;}
.slbl{font-size:12px;color:var(--tx2);margin-top:4px;}
.sbar{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.sbar input{background:none;border:none;color:var(--tx);font-family:'Sarabun',sans-serif;font-size:13px;outline:none;flex:1;}
.dcards{display:flex;flex-direction:column;gap:10px;}
.dcard{background:var(--sur);border:1.5px solid var(--bdr);border-radius:14px;padding:14px 12px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.04);}
.dcard:active{border-color:#2563eb;background:#f0f5ff;}
.dicon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.dicon.q{background:#ede9fe;}.dicon.iv{background:#fef3c7;}
.dbody{flex:1;min-width:0;}
.dname{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dmeta{font-size:11.5px;color:var(--tx2);margin-top:2px;}
.damt{font-size:14px;font-weight:700;color:#2563eb;flex-shrink:0;text-align:right;}
.ddel{background:rgba(239,68,68,.1);color:#ef4444;border:none;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:14px;flex-shrink:0;}
.ddel:active{background:#ef4444;color:#fff;}
.empty{text-align:center;padding:50px 20px;color:var(--tx2);}
.empty-icon{font-size:52px;margin-bottom:12px;}
.empty-title{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:6px;}

/* MODAL */
.mover{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(3px);z-index:50;align-items:flex-end;justify-content:center;}
.mover.on{display:flex;}
.msheet{background:var(--sur);border-radius:22px 22px 0 0;padding:6px 18px 28px;width:100%;max-width:520px;box-shadow:0 -6px 30px rgba(0,0,0,.1);}
.mhandle{width:34px;height:4px;background:#cbd5e1;border-radius:2px;margin:12px auto 18px;}
.mtitle{font-family:'Prompt',sans-serif;font-size:16px;font-weight:700;text-align:center;margin-bottom:14px;}
.mopt{display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;border:none;cursor:pointer;width:100%;margin-bottom:8px;background:var(--sur2);}
.mopt:active{opacity:.8;}
.mopt-ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.mopt-ic.q{background:#ede9fe;}.mopt-ic.iv{background:#fef3c7;}
.mopt-lbl{font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;color:var(--tx);}
.mopt-sub{font-size:12px;color:var(--tx2);margin-top:2px;}
.mcancel{width:100%;padding:14px;border-radius:12px;border:none;background:var(--sur2);color:var(--tx2);font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;}

/* EDITOR */
.enav{background:var(--sur);border-bottom:1px solid var(--bdr);padding:10px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:9;box-shadow:0 1px 8px rgba(0,0,0,.06);}
.back{display:flex;align-items:center;gap:4px;background:var(--sur2);border:1.5px solid var(--bdr);color:#2563eb;border-radius:10px;padding:8px 12px;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.etitle{font-family:'Prompt',sans-serif;font-size:14px;font-weight:700;flex:1;text-align:center;}
.ebtns{display:flex;gap:6px;flex-wrap:wrap;}
.ebtn{display:inline-flex;align-items:center;gap:4px;padding:9px 12px;border-radius:10px;border:none;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;white-space:nowrap;box-shadow:0 1px 6px rgba(0,0,0,.1);}
.ebtn:active{opacity:.8;}
.esave{background:linear-gradient(135deg,#16a34a,#059669);color:#fff;}
.esavef{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;}
.eshare{background:linear-gradient(135deg,#0891b2,#0e7490);color:#fff;}
.eprint{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;}
.vtoggle{display:none;width:100%;}
.vtbtn{flex:1;padding:11px;border:none;background:var(--sur2);color:var(--tx2);font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border-bottom:2px solid var(--bdr);}
.vtbtn.on{background:var(--sur);color:#2563eb;border-bottom-color:#2563eb;}
.ebody{display:flex;flex:1;overflow:hidden;}

/* FORM */
.fpanel{width:380px;min-width:340px;background:var(--sur);border-right:1px solid var(--bdr);overflow-y:auto;padding:14px 13px 40px;}
.fpanel::-webkit-scrollbar{width:3px;}
.fpanel::-webkit-scrollbar-thumb{background:var(--bdr);}
.sec{font-family:'Prompt',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#2563eb;margin:16px 0 8px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--bdr);}
.row{display:flex;gap:7px;margin-bottom:7px;}
.fg{display:flex;flex-direction:column;gap:3px;flex:1;}
label{font-size:11.5px;color:var(--tx2);font-weight:600;}
input,textarea,select{background:var(--sur2);border:1.5px solid var(--bdr);border-radius:10px;color:var(--tx);padding:9px 11px;font-family:'Sarabun',sans-serif;font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%;}
input:focus,textarea:focus,select:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
textarea{resize:vertical;min-height:52px;}
select option{background:#fff;}
.irow{display:grid;grid-template-columns:22px 1fr 52px 80px 26px;gap:4px;margin-bottom:5px;align-items:center;}
.inum{font-size:12px;color:var(--tx2);text-align:center;font-weight:600;}
.irow input{padding:7px 8px;font-size:12px;border-radius:8px;}
.xbtn{background:none;border:1.5px solid #fca5a5;color:#ef4444;border-radius:7px;width:26px;height:34px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
.xbtn:active{background:#ef4444;color:#fff;}
.addbtn{width:100%;padding:9px;background:transparent;border:1.5px dashed var(--bdr);border-radius:10px;color:var(--tx2);font-family:'Sarabun',sans-serif;font-size:13px;cursor:pointer;margin-top:3px;}
.addbtn:active{border-color:#2563eb;color:#2563eb;}
.totbox{background:var(--sur2);border:1px solid var(--bdr);border-radius:14px;padding:13px;margin-top:10px;display:flex;flex-direction:column;gap:7px;}
.tr{display:flex;justify-content:space-between;align-items:center;font-size:13px;}
.tr label{color:var(--tx2);}
.tr.grand{border-top:1.5px solid var(--bdr);padding-top:8px;font-size:15px;font-weight:700;color:#2563eb;}
.ckgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.ckrow{display:flex;align-items:center;gap:8px;background:var(--sur2);border-radius:8px;padding:9px 10px;}
.ckrow input[type=checkbox]{width:16px;height:16px;flex-shrink:0;accent-color:#2563eb;}
.ckrow span{font-size:12px;color:var(--tx);}

/* PREVIEW */
.ppanel{flex:1;background:#cbd5e1;overflow:auto;display:flex;flex-direction:column;align-items:center;padding:22px 10px;}
#docscaler{transform-origin:top center;}
#doc{width:794px;min-height:1123px;background:#fff;color:#000;box-shadow:0 6px 30px rgba(0,0,0,.2);font-family:'Sarabun',sans-serif;font-size:13.5px;line-height:1.55;}

/* QUOTATION */
.qw{padding:40px 52px;}
.qco{text-align:center;margin-bottom:18px;}
.qconame{font-size:19px;font-weight:700;}
.qcoen{font-size:13px;color:#444;margin-top:2px;}
.qcoaddr{font-size:12.5px;color:#444;margin-top:3px;}
.qdiv{border-top:2.5px solid #000;border-bottom:1px solid #000;height:4px;margin-bottom:24px;}
.qdate{text-align:center;margin-bottom:16px;font-size:14px;}
.qto{font-size:14px;margin-bottom:3px;}
.qsub{font-size:14px;margin-bottom:12px;}
.qintro{font-size:14px;margin-bottom:8px;}
.qitem{display:flex;justify-content:space-between;padding-left:20px;margin-bottom:4px;font-size:14px;}
.qitem-d{flex:1;}
.qitem-p{min-width:110px;text-align:right;}
.qtotalline{display:flex;justify-content:space-between;border-top:1px solid #000;border-bottom:2px solid #000;padding:4px 0;margin:6px 0 4px;font-size:14px;}
.qwords{font-size:14px;margin-bottom:14px;}
.qconds{font-size:13px;margin-bottom:14px;}
.qcondtitle{font-weight:700;margin-bottom:4px;}
.qconditem{padding-left:18px;margin-bottom:2px;}
.qclosing{text-align:center;font-size:14px;margin:26px 0 52px;}
.qsig{text-align:center;}
.qsigline{width:200px;border-top:1px solid #000;margin:0 auto 4px;}
.qsigname{font-size:13px;}

/* INVOICE */
.ivw{padding:22px 26px;}
.ivhdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.ivconame{font-size:19px;font-weight:700;margin-bottom:2px;}
.ivcoen{font-size:12.5px;color:#333;}
.ivcoaddr{font-size:12px;color:#333;line-height:1.6;margin-top:3px;}
.ivtypelines{font-size:13.5px;font-weight:700;line-height:1.9;text-align:right;}
.ivref{font-size:12px;text-align:right;margin-top:6px;}
table.ivt{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:0;}
table.ivt th,table.ivt td{border:1px solid #000;padding:5px 8px;vertical-align:top;}
table.ivt th{text-align:center;font-weight:700;font-size:11.5px;background:#fff;}
.tdcenter{text-align:center;}
.tdright{text-align:right;}
.ivbot{display:flex;border:1px solid #000;border-top:none;}
.ivwords{flex:1;padding:7px 10px;border-right:1px solid #000;}
.ivwl{font-size:11px;font-weight:700;margin-bottom:3px;}
.ivwv{font-size:12px;}
.ivtots{width:220px;}
.ivtrow{display:flex;justify-content:space-between;padding:5px 10px;font-size:12px;border-bottom:1px solid #000;}
.ivtrow:last-child{border-bottom:none;font-weight:700;}
.ivrem{font-size:12px;margin-top:8px;}
.ivremtitle{font-weight:700;margin-bottom:3px;}
.ivsigs{display:grid;grid-template-columns:1fr 1fr 1fr;border:1px solid #000;margin-top:8px;}
.ivsig{padding:10px;border-right:1px solid #000;text-align:center;font-size:12px;}
.ivsig:last-child{border-right:none;}
.ivsigsp{height:44px;}
.ivsigline{border-top:1px solid #000;margin:0 16px 4px;}

/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#1e293b;color:#f1f5f9;border-radius:10px;padding:11px 20px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.3);z-index:999;display:none;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.on{display:block;}
.toast.ok{background:#065f46;}.toast.err{background:#7f1d1d;}

@media(max-width:900px){
  .ebody{flex-direction:column;overflow:visible;}
  .fpanel{width:100%;min-width:unset;border-right:none;border-bottom:1px solid var(--bdr);}
  .ppanel{min-height:400px;padding:14px 4px;}
  .vtoggle{display:flex;}
  .ebody.sf .ppanel{display:none;}
  .ebody.sp .fpanel{display:none;}
  #doc{width:680px;}
}
@media(max-width:480px){#doc{width:100%;min-width:300px;font-size:12px;}.qw,.ivw{padding:20px 16px;}}
@media print{
  @page{size:A4 portrait;margin:8mm;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  body>*{display:none!important;}
  #pframe{display:block!important;position:fixed;top:0;left:0;width:100%;height:100%;}
}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen on" id="s-home">
  <div class="hnav">
    <span class="logo">📄 DocMaker TH</span>
    <button class="btn-new" onclick="openModal()">＋ สร้างเอกสาร</button>
  </div>
  <div class="hbody">
    <div class="stats" id="stats"></div>
    <div class="sbar"><span>🔍</span><input id="q" placeholder="ค้นหาเอกสาร..." oninput="renderHome()"></div>
    <div id="dcards"></div>
  </div>
</div>

<!-- NEW DOC MODAL -->
<div class="mover" id="modal" onclick="closeModal()">
  <div class="msheet" onclick="event.stopPropagation()">
    <div class="mhandle"></div>
    <div class="mtitle">เลือกประเภทเอกสาร</div>
    <button class="mopt" onclick="createDoc('q')">
      <div class="mopt-ic q">📝</div>
      <div><div class="mopt-lbl">ใบเสนอราคา</div><div class="mopt-sub">Quotation · แบบจดหมาย</div></div>
    </button>
    <button class="mopt" onclick="createDoc('iv')">
      <div class="mopt-ic iv">🧾</div>
      <div><div class="mopt-lbl">ใบกำกับภาษี</div><div class="mopt-sub">Tax Invoice · แบบตาราง</div></div>
    </button>
    <button class="mcancel" onclick="closeModal()">ยกเลิก</button>
  </div>
</div>

<!-- EDITOR -->
<div class="screen" id="s-edit">
  <div class="enav">
    <button class="back" onclick="goHome()">← คลัง</button>
    <span class="etitle" id="etitle">เอกสาร</span>
    <div class="ebtns">
      <button class="ebtn esave" onclick="saveDoc()">💾 เซฟ</button>
      <button class="ebtn esavef" onclick="saveFile()">📥 บันทึก</button>
      <button class="ebtn eshare" onclick="shareFile()">↗️ แชร์</button>
      <button class="ebtn eprint" onclick="doPrint()">🖨 ปริ้น</button>
    </div>
  </div>
  <div class="vtoggle" id="vt">
    <button class="vtbtn on" id="vt1" onclick="showV('f')">📝 กรอกข้อมูล</button>
    <button class="vtbtn" id="vt2" onclick="showV('p')">👁 ตัวอย่าง</button>
  </div>
  <div class="ebody sf" id="ebody">
    <div class="fpanel" id="fpanel">

      <div class="sec">ข้อมูลบริษัท</div>
      <div class="fg" style="margin-bottom:7px"><label>ชื่อบริษัท</label><input id="f-cn" type="text" value="ส.ไทยเจริญ (สำนักงานใหญ่)" oninput="render()"></div>
      <div class="fg" style="margin-bottom:7px"><label>ชื่อภาษาอังกฤษ</label><input id="f-ce" type="text" value="S. Thai Chareon (Head Office)" oninput="render()"></div>
      <div class="fg" style="margin-bottom:7px"><label>ที่อยู่</label><textarea id="f-ca" oninput="render()">147/9 หมู่บ้านเธียรเกษม หมู่1 ถ.เทพารักษ์ ต.เทพารักษ์ อ.เมือง จ.สมุทรปราการ 10270</textarea></div>
      <div class="row">
        <div class="fg"><label>โทรศัพท์</label><input id="f-ct" type="tel" value="086-332-3929" oninput="render()"></div>
        <div class="fg"><label>เลขผู้เสียภาษี</label><input id="f-cx" type="text" value="3 1009 01737 53 8" oninput="render()"></div>
      </div>
      <div class="fg" style="margin-bottom:7px"><label>ทะเบียนการค้า</label><input id="f-cr" type="text" value="อ. 8588" oninput="render()"></div>

      <div class="sec">รายละเอียดเอกสาร</div>
      <div class="fg" style="margin-bottom:7px"><label>ชื่อไฟล์</label><input id="f-fn" type="text" placeholder="ชื่อลูกค้า หรือชื่อที่ต้องการ" oninput="render()"><span id="fnprev" style="font-size:11px;color:var(--tx2);margin-top:2px;display:block"></span></div>
      <div class="row">
        <div class="fg"><label>เลขที่เอกสาร</label><input id="f-no" type="text" oninput="render()"></div>
        <div class="fg"><label>เล่มที่</label><input id="f-bk" type="text" oninput="render()"></div>
      </div>
      <div class="row">
        <div class="fg"><label>วันที่</label><input id="f-dt" type="date" oninput="render()"></div>
        <div class="fg"><label>ครบกำหนด</label><input id="f-due" type="date" oninput="render()"></div>
      </div>
      <div class="fg" style="margin-bottom:7px"><label>การชำระเงิน</label>
        <select id="f-pay" onchange="render()">
          <option>เงินสด</option><option>โอนเงิน</option><option>เช็ค</option><option>30 วัน</option><option>60 วัน</option>
        </select>
      </div>

      <div class="sec">ข้อมูลลูกค้า</div>
      <div class="fg" style="margin-bottom:7px"><label>ชื่อลูกค้า</label><input id="f-bn" type="text" oninput="render()"></div>
      <div class="fg" style="margin-bottom:7px"><label>ที่อยู่</label><textarea id="f-ba" oninput="render()"></textarea></div>
      <div class="fg" style="margin-bottom:7px"><label>เลขผู้เสียภาษี</label><input id="f-bx" type="text" oninput="render()"></div>

      <!-- QUOTATION EXTRA -->
      <div id="qextra">
        <div class="sec">เงื่อนไขชำระเงิน</div>
        <div id="clist"></div>
        <button class="addbtn" onclick="addCond()">+ เพิ่มเงื่อนไข</button>
        <div class="sec">บัญชีธนาคาร</div>
        <div class="row">
          <div class="fg"><label>ธนาคาร</label><input id="f-bk2" type="text" oninput="render()"></div>
          <div class="fg"><label>ชื่อบัญชี</label><input id="f-bkn" type="text" oninput="render()"></div>
        </div>
        <div class="fg" style="margin-bottom:7px"><label>เลขบัญชี</label><input id="f-bkno" type="text" oninput="render()"></div>
      </div>

      <!-- INVOICE EXTRA -->
      <div id="ivextra" style="display:none">
        <div class="sec">ประเภทเอกสาร</div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:8px;">
          <div class="ckrow"><input type="radio" name="doctype" id="ck-orig" value="orig" checked onchange="render()" style="width:16px;height:16px;flex-shrink:0;accent-color:#2563eb;"><span style="font-size:13px;font-weight:600;">ต้นฉบับ</span></div>
          <div class="ckrow"><input type="radio" name="doctype" id="ck-copy" value="copy" onchange="render()" style="width:16px;height:16px;flex-shrink:0;accent-color:#2563eb;"><span style="font-size:13px;font-weight:600;">สำเนา</span></div>
        </div>
        <div class="sec">หมายเหตุ</div>
        <div id="rlist"></div>
        <button class="addbtn" onclick="addRem()">+ เพิ่มหมายเหตุ</button>
      </div>

      <div class="sec">รายการสินค้า / บริการ</div>
      <div style="display:grid;grid-template-columns:22px 1fr 52px 80px 26px;gap:4px;margin-bottom:4px;">

<script>

function g(id){return (document.getElementById(id)||{}).value||'';}
function ck(id){var e=document.getElementById(id);return e?e.checked:false;}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(n){return (+n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtShort(n){var v=+n||0;return v%1===0?v.toLocaleString('th-TH'):fmt(v);}
function fdate(s){if(!s)return '–';var d=new Date(s);return d.toLocaleDateString('th-TH');}

function toast(m,t){var e=document.getElementById('toast');e.textContent=m;e.className='toast on'+(t?' '+t:'');clearTimeout(e._t);e._t=setTimeout(function(){e.className='toast';},3000);}

function getDocs(){try{return JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){return[];}}

function bahtText(n){
  var val=Math.round((+n||0)*100);
  var baht=Math.floor(val/100);
  var satang=val%100;
  var u=['','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'];
  var t=['','สิบ','ยี่สิบ','สามสิบ','สี่สิบ','ห้าสิบ','หกสิบ','เจ็ดสิบ','แปดสิบ','เก้าสิบ'];
  function r(n){
    if(n===0)return '';
    if(n<10)return u[n];
    if(n<100)return t[Math.floor(n/10)]+(n%10?u[n%10]:'');
    if(n<1e4)return r(Math.floor(n/1e3))+'พัน'+r(n%1e3);
    if(n<1e5)return r(Math.floor(n/1e4))+'หมื่น'+r(n%1e4);
    if(n<1e6)return r(Math.floor(n/1e5))+'แสน'+r(n%1e5);
    return r(Math.floor(n/1e6))+'ล้าน'+r(n%1e6);
    var h=Math.floor(n/100);return u[h]+'ร้อย'+r(n%100);
  }
  if(val===0)return 'ศูนย์บาทถ้วน';
  return r(baht)+'บาท'+(satang>0?r(satang)+'สตางค์':'ถ้วน');
}

// SCREENS

}

    '<div class="scard"><div class="snum iv">'+iv+'</div><div class="slbl">ใบกำกับภาษี</div></div>';
  var qtext=(document.getElementById('q')||{}).value||'';
  var filtered=docs.filter(function(d){return !qtext||(d.name||'').indexOf(qtext)>=0;});
  var el=document.getElementById('dcards');
  if(!filtered.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📂</div><div class="empty-title">ยังไม่มีเอกสาร</div><div>กด "+ สร้างเอกสาร" เพื่อเริ่ม</div></div>';
    return;

        '<div class="dmeta">'+(d.t==='q'?'ใบเสนอราคา':'ใบกำกับภาษี')+' · '+ds+'</div>'+

// MODAL
function openModal(){document.getElementById('modal').classList.add('on');}
function closeModal(){document.getElementById('modal').classList.remove('on');}

// CREATE DOC
function createDoc(t){
  closeModal();

  rems=['ได้รับรายการช่างต้องถูกต้องเรียบร้อยแล้ว หากมีการเสียหายแจ้งภายใน 3 วัน','ผู้ซื้อตกลงจ่ายอัตราดอกเบี้ยร้อยละ 2 ต่อเดือน ในกรณีที่ผิดนัดชำระ','สินค้าเป็นของผู้ขายจนกว่าผู้ซื้อจะชำระเงินเรียบร้อยแล้ว'];
  var today=new Date().toISOString().split('T')[0];
  var yr=new Date().getFullYear();
  var n=String(getDocs().length+1).padStart(3,'0');
  var pre=t==='q'?'QT':'IV';
  // Set form fields
  document.getElementById('f-no').value=pre+'-'+yr+'-'+n;
  document.getElementById('f-bk').value='';
  document.getElementById('f-dt').value=today;
  document.getElementById('f-due').value=today;
  document.getElementById('f-pay').value='เงินสด';
  document.getElementById('f-bn').value='';
  document.getElementById('f-ba').value='';
  document.getElementById('f-bx').value='';
  document.getElementById('f-disc').value='';
  document.getElementById('f-vat').value='7';
  document.getElementById('f-sig').value='';
  document.getElementById('f-fn').value='';
  document.getElementById('f-bk2').value='';
  document.getElementById('f-bkn').value='';
  document.getElementById('f-bkno').value='';
  // Reset radio to ต้นฉบับ
  var ro=document.getElementById('ck-orig');var rc=document.getElementById('ck-copy');

  // Setup
  document.getElementById('etitle').textContent=t==='q'?'ใบเสนอราคา':'ใบกำกับภาษี';
  document.getElementById('qextra').style.display=t==='q'?'':'none';
  document.getElementById('ivextra').style.display=t==='iv'?'':'none';
  renderItems();renderConds();renderRems();

function openDoc(id){
  var docs=getDocs();
  var d=docs.find(function(x){return x.id===id;});
  if(!d)return;
  docId=id;dtype=d.t||'q';
  var f=d.data||{};
  items=d.items||[{d:'',q:1,u:0}];
  conds=d.conds||[];rems=d.rems||[];
  // Restore fields
  var fm={cn:'f-cn',ce:'f-ce',ca:'f-ca',ct:'f-ct',cx:'f-cx',cr:'f-cr',
    no:'f-no',bk:'f-bk',dt:'f-dt',due:'f-due',pay:'f-pay',
    bn:'f-bn',ba:'f-ba',bx:'f-bx',disc:'f-disc',dtyp:'f-dtyp',vat:'f-vat',
    sig:'f-sig',fn:'f-fn',bk2:'f-bk2',bkn:'f-bkn',bkno:'f-bkno'};
  Object.keys(fm).forEach(function(k){var e=document.getElementById(fm[k]);if(e&&f[k]!==undefined)e.value=f[k];});
  // Checkboxes
  var rOrig2=document.getElementById('ck-orig');var rCopy2=document.getElementById('ck-copy');
  if(rOrig2&&rCopy2){if(f['doctype']==='copy'){rCopy2.checked=true;rOrig2.checked=false;}else{rOrig2.checked=true;rCopy2.checked=false;}}
  document.getElementById('etitle').textContent=dtype==='q'?'ใบเสนอราคา':'ใบกำกับภาษี';
  document.getElementById('qextra').style.display=dtype==='q'?'':'none';
  document.getElementById('ivextra').style.display=dtype==='iv'?'':'none';
  renderItems();renderConds();renderRems();
  showScreen('s-edit');showV('f');render();
}

function delDoc(id){
  if(!confirm('ลบเอกสารนี้?'))return;
  setDocs(getDocs().filter(function(d){return d.id!==id;}));
  if(docId===id)docId=null;
  renderHome();toast('🗑 ลบแล้ว','');
}

  var el=document.getElementById('ilist');if(!el)return;

      '<span class="inum">'+(i+1)+'</span>'+

      '<button class="xbtn" onclick="delItem('+i+')">×</button>'+

  }).join('');

    '</div>';

// CALC
function calc(){
  var sub=items.reduce(function(s,it){return s+(+it.q||0)*(+it.u||0);},0);
  var dv=+(g('f-disc'))||0,dt=g('f-dtyp');
  var disc=dt==='p'?sub*dv/100:dv;
  var after=Math.max(0,sub-disc);
  var vr=+(g('f-vat'))||0;
  var vat=after*vr/100;
  return {sub:sub,disc:disc,after:after,vr:vr,vat:vat,grand:after+vat};
}

// FILENAME
function getFilename(){
  var fn=(g('f-fn')||'').trim();
  if(fn)return fn;
  var bn=g('f-bn');var no=g('f-no');
  if(bn&&no)return bn+' ('+no+')';
  return bn||no||'เอกสาร';
}

// RENDER
function render(){
  var t=calc();
  document.getElementById('t1').textContent=fmt(t.sub)+' ฿';
  document.getElementById('t2').textContent=fmt(t.grand)+' ฿';
  var fnprev=document.getElementById('fnprev');
  if(fnprev)fnprev.textContent='📄 '+getFilename()+'.pdf';
  if(dtype==='q')renderQ(t);else renderIV(t);
}

function renderQ(t){

  var bkno=g('f-bkno'),bk2=g('f-bk2'),bkn=g('f-bkn');
  if(bkno)condHtml+='<div class="qconditem">กรุณาโอนเงินเข้าบัญชี : '+esc(bk2)+' ชื่อบัญชี : '+esc(bkn)+' เลขที่บัญชี : '+esc(bkno)+'</div>';
  document.getElementById('doc').innerHTML=

      (g('f-ce')?'<div class="qcoen">'+esc(g('f-ce'))+'</div>':'')+
      '<div class="qcoaddr">'+esc(g('f-ca')).replace(/\n/g,' ')+
        ((g('f-cr')||g('f-cx'))?'<br>'+(g('f-cr')?'ทะเบียนการค้าเลขที่ '+esc(g('f-cr'))+' ':'')+
        (g('f-cx')?'เลขประจำตัวผู้เสียภาษี '+esc(g('f-cx')):''):'')+
        (g('f-ct')?'<br>โทร: '+esc(g('f-ct')):'')+'</div>'+
    '</div>'+
    '<div class="qdiv"></div>'+
    (dateThai?'<div class="qdate">'+dateThai+'</div>':'')+
    '<div class="qto">เรียน '+(esc(g('f-bn'))||'ลูกค้า')+(g('f-ba')?' ('+esc(g('f-ba').replace(/\n/g,' '))+')'  :'')+'</div>'+
    '<div class="qsub">เรื่อง ใบเสนอราคา</div>'+
    '<div class="qintro">ทางร้านฯ ขอเสนอราคา ดังมีรายการต่อไปนี้.-</div>'+
    rows+
    '<div class="qtotalline"><span>รวมเป็นเงิน</span><span>'+fmtShort(t.grand)+' บาท</span></div>'+
    '<div class="qwords">('+bahtText(t.grand)+')</div>'+

    '<div class="qsig"><div class="qsigline"></div><div class="qsigname">('+(esc(g('f-sig'))||'.....................................')+')</div></div>'+
    '</div>';

function renderIV(t){
  var cn=g('f-cn')||'ชื่อบริษัท';
  // Check which type: ต้นฉบับ or สำเนา
  var isOrig=true;
  var rOrig=document.getElementById('ck-orig');
  var rCopy=document.getElementById('ck-copy');
  if(rCopy&&rCopy.checked)isOrig=false;
  var typeHtml=isOrig?
    'ต้นฉบับใบเสร็จรับเงิน / ต้นฉบับใบกำกับภาษี<br>ต้นฉบับใบส่งของ / ต้นฉบับใบแจ้งหนี้':
    'สำเนาใบเสร็จรับเงิน / สำเนาใบกำกับภาษี<br>สำเนาใบส่งของ / สำเนาใบแจ้งหนี้';
  var rows='';
  items.forEach(function(it,i){
    var tot=(+it.q||0)*(+it.u||0);
    rows+='<tr><td class="tdcenter">'+(i+1)+'</td><td>'+esc(it.d)+'</td><td class="tdcenter">'+((+it.q)>0?fmt(it.q):'')+'</td><td class="tdright">'+((+it.u)>0?fmt(it.u):'')+'</td><td class="tdright">'+(tot>0?fmt(tot):'')+'</td></tr>';
  });
  var pad=Math.max(0,8-items.length);
  for(var i=0;i<pad;i++)rows+='<tr><td style="height:20px">&nbsp;</td><td></td><td></td><td></td><td></td></tr>';
  var remHtml='';
  if(rems.length){
    remHtml='<div class="ivrem"><div class="ivremtitle">หมายเหตุ</div>';
    rems.forEach(function(r,i){if(r)remHtml+='<div>('+(i+1)+') '+esc(r)+'</div>';});
    remHtml+='</div>';
  }
  var totalRows=3+(t.disc>0?1:0);
  var totRows='<tr>'+

// SCALE DOC
function scaleDoc(){
  var sc=document.getElementById('docscaler');
  var pp=document.getElementById('ppanel');
  if(!sc||!pp)return;
  var w=pp.clientWidth-24;
  var s=Math.min(1,w/794);
  sc.style.transform='scale('+s+')';
  sc.style.marginBottom=((1123*s)-1123)+'px';
}

// SAVE/LOAD
function getData(){
  var t=calc();
  var fm={cn:'f-cn',ce:'f-ce',ca:'f-ca',ct:'f-ct',cx:'f-cx',cr:'f-cr',
    no:'f-no',bk:'f-bk',dt:'f-dt',due:'f-due',pay:'f-pay',
    bn:'f-bn',ba:'f-ba',bx:'f-bx',disc:'f-disc',dtyp:'f-dtyp',vat:'f-vat',
    sig:'f-sig',fn:'f-fn',bk2:'f-bk2',bkn:'f-bkn',bkno:'f-bkno'};
  var f={};
  Object.keys(fm).forEach(function(k){f[k]=g(fm[k]);});
  var rCopy=document.getElementById('ck-copy');f['doctype']=rCopy&&rCopy.checked?'copy':'orig';
  return {data:f,items:JSON.parse(JSON.stringify(items)),conds:conds.slice(),rems:rems.slice(),grand:t.grand};
}

function saveDoc(){
  var d=getData();
  var name=getFilename();
  var docs=getDocs();
  var idx=docs.findIndex(function(x){return x.id===docId;});
  var entry={id:docId||('d'+Date.now()),t:dtype,name:name,amt:d.grand,at:new Date().toISOString(),
    data:d.data,items:d.items,conds:d.conds,rems:d.rems};
  if(idx>=0)docs[idx]=entry;else{docs.unshift(entry);docId=entry.id;}
  setDocs(docs);
  toast('✅ บันทึกแล้ว: '+name,'ok');
}

// PDF/SHARE/PRINT
function loadLib(cb){
  if(window.html2canvas&&window.jspdf){cb();return;}
  var s1=document.createElement('script');
  s1.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
  s1.onload=function(){
    var s2=document.createElement('script');
    s2.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s2.onload=cb;
    s2.onerror=function(){toast('❌ โหลดไม่ได้ ต้องต่อเน็ต','err');};
    document.head.appendChild(s2);
  };
  s1.onerror=function(){toast('❌ โหลดไม่ได้ ต้องต่อเน็ต','err');};
  document.head.appendChild(s1);
}

function makePDF(cb){
  showV('p');
  toast('⏳ กำลังสร้าง PDF…','');
  loadLib(function(){
    setTimeout(function(){
      var el=document.getElementById('doc');
      var sc=document.getElementById('docscaler');
      var st=sc?sc.style.transform:'';
      var sm=sc?sc.style.marginBottom:'';
      var ow=el.style.width;
      el.style.width='794px';
      if(sc){sc.style.transform='none';sc.style.marginBottom='0';}
      html2canvas(el,{scale:2,backgroundColor:'#fff',useCORS:true,logging:false}).then(function(c){
        el.style.width=ow;
        if(sc){sc.style.transform=st;sc.style.marginBottom=sm;}
        var pdf=new window.jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
        var iw=190,mg=10,ph=(297-mg*2)*(c.width/iw);
        var y=0,pg=0;
        while(y<c.height){
          if(pg>0)pdf.addPage();
          var sl=Math.min(ph,c.height-y);
          var c2=document.createElement('canvas');c2.width=c.width;c2.height=sl;
          c2.getContext('2d').drawImage(c,0,y,c.width,sl,0,0,c.width,sl);
          pdf.addImage(c2.toDataURL('image/jpeg',0.95),'JPEG',mg,mg,iw,sl/(c.width/iw));
          y+=ph;pg++;
        }
        cb(pdf);
      }).catch(function(e){el.style.width=ow;if(sc){sc.style.transform=st;sc.style.marginBottom=sm;}toast('❌ '+e.message,'err');});
    },200);
  });
}

function saveFile(){
  makePDF(function(pdf){
    var name=getFilename()+'.pdf';
    var blob=pdf.output('blob');
    if(navigator.share&&navigator.canShare){
      try{
        var file=new File([blob],name,{type:'application/pdf'});
        if(navigator.canShare({files:[file]})){
          navigator.share({files:[file],title:name}).then(function(){toast('✅ บันทึก/แชร์สำเร็จ','ok');}).catch(function(){});
          return;
        }
      }catch(e){}
    }
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=name;a.style.display='none';
    document.body.appendChild(a);a.click();
    setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},2000);
    toast('✅ บันทึก PDF แล้ว','ok');
  });
}

function shareFile(){
  makePDF(function(pdf){
    var name=getFilename()+'.pdf';
    var blob=pdf.output('blob');
    try{
      var file=new File([blob],name,{type:'application/pdf'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:name,text:'เอกสารจาก ส.ไทยเจริญ'}).then(function(){toast('✅ แชร์สำเร็จ','ok');}).catch(function(e){if(e.name!=='AbortError')toast('❌ '+e.message,'err');});
        return;
      }
    }catch(e){}
    var url=URL.createObjectURL(blob);
    window.open(url,'_blank');
    toast('✅ เปิด PDF แล้ว กด Share เพื่อส่งต่อ','ok');
  });
}
