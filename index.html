<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DocMaker TH</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Prompt:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--sur:#1a1d27;--sur2:#22263a;--bdr:#2e3350;
  --acc:#4f8ef7;--acc2:#00d4aa;--tx:#e8eaf6;--tx2:#8892b0;
  --q:#6c63ff;--iv:#f59e0b;--rc:#10b981;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;}

/* ══════════════════════════════
   SCREEN SYSTEM
══════════════════════════════ */
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}

/* ══════════════════════════════
   HOME SCREEN
══════════════════════════════ */
.home-nav{
  background:var(--sur);
  border-bottom:1px solid var(--bdr);
  padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;
}
.logo{font-family:'Prompt',sans-serif;font-size:18px;font-weight:700;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.new-doc-btn{
  display:flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,var(--acc),#6c63ff);
  color:#fff;border:none;border-radius:10px;
  padding:10px 18px;font-family:'Sarabun',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;
}
.new-doc-btn:active{opacity:.8;}

.home-body{flex:1;padding:18px;overflow-y:auto;}

.home-stats{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:10px;margin-bottom:20px;
}
.stat-card{
  background:var(--sur);border:1px solid var(--bdr);
  border-radius:12px;padding:14px 12px;text-align:center;
}
.stat-num{font-family:'Prompt',sans-serif;font-size:22px;font-weight:700;margin-bottom:2px;}
.stat-num.q{color:var(--q);}
.stat-num.iv{color:var(--iv);}
.stat-num.rc{color:var(--rc);}
.stat-label{font-size:11px;color:var(--tx2);}

.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.section-title{font-family:'Prompt',sans-serif;font-size:13px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.8px;}

.search-bar{
  background:var(--sur);border:1px solid var(--bdr);
  border-radius:10px;padding:10px 14px;
  display:flex;align-items:center;gap:8px;
  margin-bottom:14px;
}
.search-bar input{
  background:none;border:none;color:var(--tx);
  font-family:'Sarabun',sans-serif;font-size:13px;
  outline:none;flex:1;
}
.search-bar input::placeholder{color:var(--tx2);}

.filter-row{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;}
.filter-btn{
  padding:7px 14px;border-radius:20px;border:1px solid var(--bdr);
  background:transparent;color:var(--tx2);
  font-family:'Sarabun',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;white-space:nowrap;
}
.filter-btn.on{background:var(--acc);border-color:var(--acc);color:#fff;}

.doc-grid{display:flex;flex-direction:column;gap:10px;}

.doc-card{
  background:var(--sur);border:1px solid var(--bdr);
  border-radius:14px;padding:16px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:border-color .15s;
  position:relative;
}
.doc-card:active{border-color:var(--acc);}
.doc-card-icon{
  width:46px;height:46px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
.doc-card-icon.q{background:rgba(108,99,255,.15);}
.doc-card-icon.iv{background:rgba(245,158,11,.15);}
.doc-card-icon.rc{background:rgba(16,185,129,.15);}
.doc-card-body{flex:1;min-width:0;}
.doc-card-name{font-size:14px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.doc-card-meta{font-size:12px;color:var(--tx2);display:flex;gap:10px;flex-wrap:wrap;}
.doc-card-amount{font-size:15px;font-weight:700;color:var(--acc2);text-align:right;flex-shrink:0;}
.doc-card-date{font-size:11px;color:var(--tx2);margin-top:2px;}

.doc-card-actions{
  position:absolute;top:10px;right:10px;
  display:flex;gap:4px;
}
.card-act-btn{
  width:30px;height:30px;border-radius:8px;border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:pointer;
}
.card-act-del{background:rgba(255,107,107,.15);color:#ff6b6b;}
.card-act-del:active{background:#ff6b6b;color:#fff;}

.empty-home{
  text-align:center;padding:60px 20px;color:var(--tx2);
}
.empty-home-icon{font-size:56px;margin-bottom:16px;}
.empty-home-title{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--tx);}
.empty-home-sub{font-size:13px;line-height:1.6;}

/* New doc modal */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);z-index:100;
  align-items:flex-end;justify-content:center;
}
.modal-overlay.on{display:flex;}
.modal-sheet{
  background:var(--sur);border-radius:20px 20px 0 0;
  padding:20px;width:100%;max-width:500px;
}
.modal-title{font-family:'Prompt',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;text-align:center;}
.modal-options{display:flex;flex-direction:column;gap:10px;}
.modal-opt{
  display:flex;align-items:center;gap:14px;
  padding:16px;border-radius:14px;border:none;
  cursor:pointer;text-align:left;width:100%;
}
.modal-opt:active{opacity:.8;}
.modal-opt-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;}
.modal-opt-label{font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;}
.modal-opt-sub{font-size:12px;opacity:.7;margin-top:2px;}
.modal-cancel{
  margin-top:12px;width:100%;padding:14px;border-radius:12px;
  border:none;background:var(--sur2);color:var(--tx2);
  font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;cursor:pointer;
}
.opt-q{background:rgba(108,99,255,.2);}
.opt-iv{background:rgba(245,158,11,.2);}
.opt-rc{background:rgba(16,185,129,.2);}

/* ══════════════════════════════
   EDITOR SCREEN
══════════════════════════════ */
.editor-nav{
  background:var(--sur);border-bottom:1px solid var(--bdr);
  padding:10px 14px;display:flex;align-items:center;gap:8px;
  flex-wrap:wrap;position:sticky;top:0;z-index:10;
}
.back-btn{
  display:flex;align-items:center;gap:5px;
  background:none;border:none;color:var(--acc);
  font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;padding:8px 4px;
}
.editor-title{font-family:'Prompt',sans-serif;font-size:14px;font-weight:700;flex:1;text-align:center;}
.editor-actions{display:flex;gap:6px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:4px;padding:9px 12px;border-radius:8px;border:none;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;white-space:nowrap;}
.btn:active{opacity:.7;}
.b-save{background:#2e7d32;color:#fff;}
.b-pdf{background:#d32f2f;color:#fff;}
.b-jpg{background:#e65100;color:#fff;}
.b-device{background:#1565c0;color:#fff;}
.b-print{background:var(--acc2);color:#0f1117;}

.view-toggle{display:none;width:100%;}
.vt-btn{flex:1;padding:11px;border:none;background:var(--sur);color:var(--tx2);font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border-bottom:1px solid var(--bdr);}
.vt-btn.on{background:var(--acc);color:#fff;}

.editor-body{display:flex;flex:1;overflow:hidden;}

/* FORM */
.form-panel{width:380px;min-width:340px;background:var(--sur);border-right:1px solid var(--bdr);overflow-y:auto;padding:14px 13px 40px;}
.sec{font-family:'Prompt',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--acc);margin:15px 0 7px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--bdr);}
.row{display:flex;gap:7px;margin-bottom:6px;}
.fg{display:flex;flex-direction:column;gap:3px;flex:1;}
label{font-size:11px;color:var(--tx2);font-weight:600;}
input,textarea,select{background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;color:var(--tx);padding:9px 10px;font-family:'Sarabun',sans-serif;font-size:13px;outline:none;transition:border-color .2s;width:100%;}
input:focus,textarea:focus,select:focus{border-color:var(--acc);}
textarea{resize:vertical;min-height:50px;}
select option{background:#1a1d27;}
.ih{display:grid;grid-template-columns:22px 1fr 50px 76px 26px;gap:4px;margin-bottom:4px;}
.ih span{font-size:10px;color:var(--tx2);font-weight:700;text-transform:uppercase;}
.ir{display:grid;grid-template-columns:22px 1fr 50px 76px 26px;gap:4px;margin-bottom:5px;align-items:center;}
.ir input{padding:7px 7px;font-size:12px;}
.ir .seq{font-size:12px;color:var(--tx2);text-align:center;}
.xbtn{background:none;border:1px solid #ff6b6b;color:#ff6b6b;border-radius:6px;width:26px;height:33px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.xbtn:active{background:#ff6b6b;color:#fff;}
.add-btn{width:100%;padding:9px;background:transparent;border:1px dashed var(--bdr);border-radius:8px;color:var(--tx2);font-family:'Sarabun',sans-serif;font-size:13px;cursor:pointer;margin-top:3px;}
.add-btn:active{border-color:var(--acc);color:var(--acc);}
.tot-box{background:var(--sur2);border-radius:10px;padding:12px;margin-top:10px;display:flex;flex-direction:column;gap:6px;}
.tr{display:flex;justify-content:space-between;align-items:center;font-size:13px;}
.tr label{color:var(--tx2);}
.tr.grand{border-top:1px solid var(--bdr);padding-top:8px;font-size:15px;font-weight:700;color:var(--acc2);}
.cond-row{display:flex;gap:5px;align-items:center;margin-bottom:5px;}
.cond-row input{font-size:12px;padding:7px 8px;}
.cond-del{background:none;border:1px solid #ff6b6b;color:#ff6b6b;border-radius:5px;padding:4px 8px;font-size:13px;cursor:pointer;flex-shrink:0;}

/* PREVIEW */
.prev-panel{flex:1;background:#2a2d3a;overflow:auto;display:flex;justify-content:center;padding:24px 12px;}

/* ── A4 DOC ── */
#doc{width:780px;min-height:1050px;background:#fff;color:#000;box-shadow:0 16px 50px rgba(0,0,0,.5);font-family:'Sarabun',sans-serif;font-size:13px;line-height:1.5;}

/* Quotation (letter style) */
.q-wrap{padding:40px 52px;}
.q-co{text-align:center;margin-bottom:20px;}
.q-co-name{font-size:20px;font-weight:700;}
.q-co-addr{font-size:13px;color:#333;}
.q-divider{border-top:2px solid #000;border-bottom:1px solid #000;height:4px;margin-bottom:28px;}
.q-date{text-align:center;margin-bottom:18px;font-size:14px;}
.q-to{margin-bottom:3px;font-size:14px;}
.q-sub{margin-bottom:14px;font-size:14px;}
.q-intro{margin-bottom:8px;font-size:14px;}
.q-item{display:flex;justify-content:space-between;margin-bottom:4px;font-size:14px;padding-left:20px;}
.q-item-num{min-width:24px;flex-shrink:0;}
.q-item-desc{flex:1;}
.q-item-price{min-width:110px;text-align:right;}
.q-total-line{display:flex;justify-content:space-between;border-top:1px solid #000;border-bottom:2px solid #000;padding:4px 0;margin:6px 0 4px;font-size:14px;}
.q-words{font-size:14px;margin-bottom:16px;}
.q-conds{font-size:13px;margin-bottom:16px;}
.q-cond-title{font-weight:700;margin-bottom:4px;}
.q-cond-item{padding-left:20px;margin-bottom:2px;}
.q-closing{text-align:center;font-size:14px;margin:28px 0 55px;}
.q-sig{text-align:center;font-size:13px;}
.q-sig-line{width:220px;border-top:1px solid #000;margin:0 auto 4px;}

/* Invoice (table style) */
.iv-wrap{padding:24px 28px;}
.iv-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.iv-co-name{font-size:20px;font-weight:700;margin-bottom:2px;}
.iv-co-en{font-size:13px;color:#333;margin-bottom:5px;}
.iv-co-addr{font-size:12px;color:#333;line-height:1.6;}
.iv-type-title{font-size:14px;font-weight:700;line-height:1.8;text-align:right;}
.iv-ref{font-size:12.5px;margin-top:8px;text-align:right;}
.iv-cust{border:1px solid #000;}
.iv-cust-row{display:flex;border-bottom:1px solid #000;}
.iv-cust-row:last-child{border-bottom:none;}
.iv-cust-l{flex:1;padding:7px 10px;border-right:1px solid #000;}
.iv-cust-r{width:235px;padding:7px 10px;font-size:12px;line-height:1.8;}
.iv-cl{font-size:12px;font-weight:700;}
.iv-cv{font-size:12px;}
table.iv-tbl{width:100%;border-collapse:collapse;font-size:12.5px;}
table.iv-tbl th{background:#fff;border:1px solid #000;padding:7px 8px;text-align:center;font-weight:700;font-size:12px;}
table.iv-tbl td{border:1px solid #000;padding:6px 8px;vertical-align:top;}
table.iv-tbl td.c{text-align:center;}table.iv-tbl td.r{text-align:right;}
.iv-bot{display:flex;border:1px solid #000;border-top:none;}
.iv-words{flex:1;padding:8px 10px;border-right:1px solid #000;}
.iv-words-l{font-size:11.5px;font-weight:700;margin-bottom:2px;}
.iv-words-v{font-size:12px;}
.iv-tots{width:228px;}
.iv-tot-row{display:flex;justify-content:space-between;border-bottom:1px solid #000;padding:6px 10px;font-size:12.5px;}
.iv-tot-row:last-child{border-bottom:none;font-weight:700;}
.iv-rem{margin-top:10px;font-size:12px;}
.iv-rem-title{font-weight:700;margin-bottom:3px;font-size:12.5px;}
.iv-sig-row{display:grid;grid-template-columns:1fr 1fr 1fr;border:1px solid #000;margin-top:10px;}
.iv-sig-cell{padding:10px;border-right:1px solid #000;text-align:center;font-size:12px;}
.iv-sig-cell:last-child{border-right:none;}
.iv-sig-space{height:48px;}
.iv-sig-line{border-top:1px solid #000;margin:0 18px 4px;}
.iv-sig-date{font-size:11px;color:#555;}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:11px 20px;font-size:13px;color:var(--tx);box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:999;display:none;white-space:nowrap;}
.toast.on{display:block;}
.toast.ok{border-color:var(--acc2);}
.toast.err{border-color:#ff6b6b;}

@media(max-width:900px){
  .editor-body{flex-direction:column;overflow:visible;}
  .editor-body.show-form .form-panel{display:flex;flex-direction:column;}
  .editor-body.show-form .prev-panel{display:none;}
  .editor-body.show-prev .form-panel{display:none;}
  .editor-body.show-prev .prev-panel{display:flex;}
  .form-panel{width:100%;min-width:unset;border-right:none;border-bottom:1px solid var(--bdr);}
  .prev-panel{min-height:500px;padding:16px 4px;}
  #doc{width:680px;}
  .view-toggle{display:flex;}
  .home-stats{grid-template-columns:repeat(3,1fr);}
}
@media(max-width:520px){
  #doc{width:100%;min-width:320px;font-size:11.5px;}
  .q-wrap,.iv-wrap{padding:20px 16px;}
  .iv-hdr{flex-direction:column;gap:8px;}
  .iv-type-title{text-align:left;}
  .editor-actions .btn span{display:none;}
}
@media print{
  @page{size:A4 portrait;margin:0;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  body>*:not(#screen-editor){display:none!important;}
  #screen-editor{display:flex!important;flex-direction:column;}
  .editor-nav,.view-toggle,.form-panel{display:none!important;}
  .editor-body{display:block!important;}
  .prev-panel{display:block!important;padding:0!important;background:#fff!important;overflow:visible!important;}
  #doc{display:block!important;width:210mm!important;min-height:297mm!important;box-shadow:none!important;margin:0!important;padding:12mm 14mm!important;}
}
</style>
</head>
<body>

<!-- ════════════════════════════
     SCREEN: HOME
════════════════════════════ -->
<div class="screen active" id="screen-home">
  <div class="home-nav">
    <span class="logo">📄 DocMaker TH</span>
    <button class="new-doc-btn" onclick="showNewModal()">＋ สร้างเอกสาร</button>
  </div>
  <div class="home-body">
    <div class="home-stats" id="home-stats"></div>
    <div class="search-bar">
      <span style="color:var(--tx2);font-size:16px">🔍</span>
      <input type="text" id="search-input" placeholder="ค้นหาเอกสาร..." oninput="renderHome()">
    </div>
    <div class="filter-row" id="filter-row">
      <button class="filter-btn on" data-f="all" onclick="setFilter('all')">ทั้งหมด</button>
      <button class="filter-btn" data-f="quotation" onclick="setFilter('quotation')">ใบเสนอราคา</button>
      <button class="filter-btn" data-f="invoice" onclick="setFilter('invoice')">ใบกำกับภาษี</button>
      <button class="filter-btn" data-f="receipt" onclick="setFilter('receipt')">ใบเสร็จรับเงิน</button>
    </div>
    <div class="doc-grid" id="doc-grid"></div>
  </div>
</div>

<!-- NEW DOC MODAL -->
<div class="modal-overlay" id="new-modal" onclick="closeNewModal()">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-title">เลือกประเภทเอกสาร</div>
    <div class="modal-options">
      <button class="modal-opt" onclick="createDoc('quotation')">
        <div class="modal-opt-icon opt-q">📝</div>
        <div><div class="modal-opt-label">ใบเสนอราคา</div><div class="modal-opt-sub">Quotation · แบบจดหมาย</div></div>
      </button>
      <button class="modal-opt" onclick="createDoc('invoice')">
        <div class="modal-opt-icon opt-iv">🧾</div>
        <div><div class="modal-opt-label">ใบกำกับภาษี</div><div class="modal-opt-sub">Tax Invoice · แบบตาราง</div></div>
      </button>
      <button class="modal-opt" onclick="createDoc('receipt')">
        <div class="modal-opt-icon opt-rc">✅</div>
        <div><div class="modal-opt-label">ใบเสร็จรับเงิน</div><div class="modal-opt-sub">Receipt · แบบตาราง</div></div>
      </button>
    </div>
    <button class="modal-cancel" onclick="closeNewModal()">ยกเลิก</button>
  </div>
</div>

<!-- ════════════════════════════
     SCREEN: EDITOR
════════════════════════════ -->
<div class="screen" id="screen-editor">
  <div class="editor-nav">
    <button class="back-btn" onclick="goHome()">← คลัง</button>
    <span class="editor-title" id="editor-title">เอกสาร</span>
    <div class="editor-actions">
      <button class="btn b-save" onclick="saveDoc()">💾 <span>เซฟในแอพ</span></button>
      <button class="btn b-pdf"  onclick="saveToDevice()">📥 <span>บันทึกลงเครื่อง</span></button>
      <button class="btn b-print" onclick="doPrint()">🖨 <span>ปริ้น BT</span></button>
    </div>
  </div>

  <div class="view-toggle" id="vtoggle">
    <button class="vt-btn on" id="vt-form" onclick="showView('form')">📝 กรอกข้อมูล</button>
    <button class="vt-btn" id="vt-prev" onclick="showView('prev')">👁 ตัวอย่าง</button>
  </div>

  <div class="editor-body show-form" id="editor-body">
    <!-- FORM PANEL -->
    <div class="form-panel" id="form-panel">
      <div class="sec">ข้อมูลบริษัท / ร้านค้า</div>
      <div class="fg" style="margin-bottom:6px"><label>ชื่อบริษัท / ร้านค้า</label><input id="f-cname" type="text" oninput="render()"></div>
      <div class="fg" style="margin-bottom:6px"><label>ชื่อภาษาอังกฤษ</label><input id="f-cen" type="text" oninput="render()"></div>
      <div class="fg" style="margin-bottom:6px"><label>ที่อยู่</label><textarea id="f-caddr" oninput="render()"></textarea></div>
      <div class="row">
        <div class="fg"><label>โทรศัพท์</label><input id="f-ctel" type="tel" oninput="render()"></div>
        <div class="fg"><label>เลขผู้เสียภาษี</label><input id="f-ctax" type="text" oninput="render()"></div>
      </div>

<script>
var KEY='dm3_docs';
var currentDocId=null;
var dtype='quotation';
var items=[{d:'',q:1,u:0},{d:'',q:1,u:0}];
var conds=['ชำระมัดจำ 50% ในวันสั่งจ้าง','ชำระส่วนที่เหลือ 50% ในวันส่งมอบงาน','กำหนดยืนราคาภายใน 30 วัน','ราคานี้ไม่รวมภาษีมูลค่าเพิ่ม 7%'];
var remarks=['ได้รับรายการช่างต้องถูกต้องเรียบร้อยแล้ว หากมีการเสียหายแจ้งภายใน 3 วัน นับจากวันได้รับสินค้า','ผู้ซื้อตกลงจ่ายอัตราดอกเบี้ยร้อยละ 2 ต่อเดือน ในกรณีที่ผิดนัดชำระ','สินค้าเป็นของผู้ขายจนกว่าผู้ซื้อจะชำระเงินเรียบร้อยแล้ว'];
var filterType='all';

// ── UTILS ──
function g(id){return (document.getElementById(id)||{}).value||'';}
function chk(id){var el=document.getElementById(id);return el?el.checked:false;}
function fmt(n){return (+n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fdShort(s){if(!s)return '–';var d=new Date(s);return d.toLocaleDateString('th-TH');}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function getDocs(){try{return JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){return[];}}
function saveDocs(d){localStorage.setItem(KEY,JSON.stringify(d));}
function toast(msg,t){var el=document.getElementById('toast');el.textContent=msg;el.className='toast on'+(t?' '+t:'');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('on');},3000);}

function bahtText(n){
  var num=Math.round(+n||0);
  var u=['','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'];
  var t=['','สิบ','ยี่สิบ','สามสิบ','สี่สิบ','ห้าสิบ','หกสิบ','เจ็ดสิบ','แปดสิบ','เก้าสิบ'];
  function r(n){
    if(n===0)return '';if(n<10)return u[n];
    if(n<100){return t[Math.floor(n/10)]+(n%10?u[n%10]:'');}
    if(n<1000)return u[Math.floor(n/100)]+'ร้อย'+r(n%100);
    if(n<10000)return r(Math.floor(n/1000))+'พัน'+r(n%1000);
    if(n<100000)return r(Math.floor(n/10000))+'หมื่น'+r(n%10000);
    if(n<1000000)return r(Math.floor(n/100000))+'แสน'+r(n%100000);
    return r(Math.floor(n/1000000))+'ล้าน'+r(n%1000000);
  }
  if(num===0)return 'ศูนย์บาทถ้วน';
  return r(num)+'บาทถ้วน';
}

// ── SCREENS ──
function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
}

// ── HOME ──
function goHome(){
  showScreen('screen-home');
  renderHome();
}

function setFilter(f){
  filterType=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){
    b.classList.toggle('on', b.getAttribute('data-f')===f);
  });
  renderHome();
}

function renderHome(){
  var docs=getDocs();
  var q=0,iv=0,rc=0;
  docs.forEach(function(d){if(d.dtype==='quotation')q++;else if(d.dtype==='invoice')iv++;else rc++;});
  document.getElementById('home-stats').innerHTML=
    '<div class="stat-card"><div class="stat-num q">'+q+'</div><div class="stat-label">ใบเสนอราคา</div></div>'+
    '<div class="stat-card"><div class="stat-num iv">'+iv+'</div><div class="stat-label">ใบกำกับภาษี</div></div>'+
    '<div class="stat-card"><div class="stat-num rc">'+rc+'</div><div class="stat-label">ใบเสร็จรับเงิน</div></div>';

  var q_text=(document.getElementById('search-input')||{}).value||'';
  var filtered=docs.filter(function(d){
    var typeOk=(filterType==='all'||d.dtype===filterType);
    var searchOk=!q_text||(d.name||'').toLowerCase().indexOf(q_text.toLowerCase())>=0;
    return typeOk&&searchOk;
  });

  var grid=document.getElementById('doc-grid');
  if(!filtered.length){
    grid.innerHTML='<div class="empty-home"><div class="empty-home-icon">📂</div><div class="empty-home-title">ยังไม่มีเอกสาร</div><div class="empty-home-sub">กดปุ่ม "สร้างเอกสาร" เพื่อเริ่มต้น</div></div>';
    return;
  }
  var icons={quotation:'📝',invoice:'🧾',receipt:'✅'};
  var labels={quotation:'ใบเสนอราคา',invoice:'ใบกำกับภาษี',receipt:'ใบเสร็จรับเงิน'};
  var typeClass={quotation:'q',invoice:'iv',receipt:'rc'};
  grid.innerHTML=filtered.map(function(d){
    var dt=new Date(d.at);
    var ds=dt.toLocaleDateString('th-TH',{year:'numeric',month:'short',day:'numeric'});
    var tc=typeClass[d.dtype]||'q';
    return '<div class="doc-card" onclick="openDoc(\''+d.id+'\')" >'+
      '<div class="doc-card-icon '+tc+'">'+icons[d.dtype]+'</div>'+
      '<div class="doc-card-body">'+
        '<div class="doc-card-name">'+(d.name||'ไม่มีชื่อ')+'</div>'+
        '<div class="doc-card-meta">'+
          '<span>'+labels[d.dtype]+'</span>'+
          (d.customer?'<span>'+d.customer+'</span>':'')+
        '</div>'+
        '<div class="doc-card-date">'+ds+'</div>'+
      '</div>'+
      '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;padding-right:8px">'+
        '<div class="doc-card-amount">'+fmt(d.grand||0)+' ฿</div>'+
        '<button class="card-act-btn card-act-del" onclick="event.stopPropagation();deleteDocHome(\''+d.id+'\')">🗑</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function showNewModal(){document.getElementById('new-modal').classList.add('on');}
function closeNewModal(){document.getElementById('new-modal').classList.remove('on');}

function createDoc(t){
  closeNewModal();
  currentDocId=null;
  dtype=t;
  items=[{d:'',q:1,u:0},{d:'',q:1,u:0}];
  conds=['ชำระมัดจำ 50% ในวันสั่งจ้าง','ชำระส่วนที่เหลือ 50% ในวันส่งมอบงาน','กำหนดยืนราคาภายใน 30 วัน','ราคานี้ไม่รวมภาษีมูลค่าเพิ่ม 7%'];
  remarks=['ได้รับรายการช่างต้องถูกต้องเรียบร้อยแล้ว หากมีการเสียหายแจ้งภายใน 3 วัน','ผู้ซื้อตกลงจ่ายอัตราดอกเบี้ยร้อยละ 2 ต่อเดือน ในกรณีที่ผิดนัดชำระ','สินค้าเป็นของผู้ขายจนกว่าผู้ซื้อจะชำระเงินเรียบร้อยแล้ว'];
  var today=new Date().toISOString().split('T')[0];
  var docs=getDocs();
  var n=String(docs.length+1).padStart(3,'0');
  var yr=new Date().getFullYear();
  var prefix={quotation:'QT',invoice:'IV',receipt:'RC'}[t]||'DOC';
  clearFields();
  document.getElementById('f-docno').value=prefix+'-'+yr+'-'+n;
  document.getElementById('f-date').value=today;
  document.getElementById('f-due').value=today;
  document.getElementById('f-vat').value='7';
  setEditorType(t);
  renderItems();renderConds();renderRemarks();render();
  showScreen('screen-editor');
}

function openDoc(id){
  var docs=getDocs();
  var d=docs.find(function(x){return x.id===id;});
  if(!d)return;
  currentDocId=id;
  setData(d.data);
  showScreen('screen-editor');
}

function deleteDocHome(id){
  if(!confirm('ลบเอกสารนี้?'))return;
  var docs=getDocs().filter(function(d){return d.id!==id;});
  saveDocs(docs);
  renderHome();
  toast('🗑 ลบแล้ว','');
}

// ── EDITOR ──
function clearFields(){
  ['f-cname','f-cen','f-caddr','f-ctel','f-ctax','f-creg','f-docno','f-docbook',
   'f-bname','f-baddr','f-btax','f-disc','f-sig','f-bank','f-bacname','f-bacno'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.value='';
  });
}

function setEditorType(t){
  dtype=t;
  var labels={quotation:'ใบเสนอราคา',invoice:'ใบกำกับภาษี',receipt:'ใบเสร็จรับเงิน'};
  document.getElementById('editor-title').textContent=labels[t]||t;
  document.getElementById('q-extra').style.display=(t==='quotation')?'':'none';
  document.getElementById('iv-extra').style.display=(t!=='quotation')?'':'none';
}

function showView(v){
  var eb=document.getElementById('editor-body');
  eb.className='editor-body '+(v==='form'?'show-form':'show-prev');
  document.getElementById('vt-form').classList.toggle('on',v==='form');
  document.getElementById('vt-prev').classList.toggle('on',v==='prev');
}

function calc(){
  var sub=items.reduce(function(s,it){return s+(+it.q||0)*(+it.u||0);},0);
  var dv=+(g('f-disc'))||0,dt=g('f-dtyp');
  var disc=dt==='p'?sub*dv/100:dv;
  var after=Math.max(0,sub-disc);
  var vr=+(g('f-vat'))||0;
  var vat=after*vr/100;
  var grand=after+vat;
  return {sub:sub,disc:disc,after:after,vr:vr,vat:vat,grand:grand};
}

function render(){
  try{
    var t=calc();
    document.getElementById('t-sub').textContent=fmt(t.sub)+' ฿';
    document.getElementById('t-grand').textContent=fmt(t.grand)+' ฿';
    if(dtype==='quotation')renderQ(t);else renderIV(t);
  }catch(e){console.log('render:',e);}
}

function renderQ(t){
  var cname=g('f-cname')||'ชื่อร้าน/บริษัท';
  var dateStr=g('f-date');var dateThai='';
  if(dateStr){var dd=new Date(dateStr);dateThai='วันที่ '+dd.getDate()+' '+['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'][dd.getMonth()]+' พ.ศ. '+(dd.getFullYear()+543);}
  var rows='';
  items.forEach(function(it,i){
    if(!it.d&&!(+it.u))return;
    var tot=(+it.q||0)*(+it.u||0);
    rows+='<div class="q-item"><span class="q-item-num">'+(i+1)+'.</span><span class="q-item-desc">'+esc(it.d)+'</span><span class="q-item-price">'+fmt(tot)+'.00 บาท</span></div>';
  });
  if(t.disc>0)rows+='<div class="q-item"><span class="q-item-num"></span><span class="q-item-desc">ส่วนลด</span><span class="q-item-price">- '+fmt(t.disc)+'.00 บาท</span></div>';
  if(t.vr>0)rows+='<div class="q-item"><span class="q-item-num"></span><span class="q-item-desc">VAT '+t.vr+'%</span><span class="q-item-price">'+fmt(t.vat)+'.00 บาท</span></div>';
  var condHtml='';conds.forEach(function(c,i){if(c)condHtml+='<div class="q-cond-item">'+(i+1)+'. '+esc(c)+'</div>';});
  var bank=g('f-bank'),bacname=g('f-bacname'),bacno=g('f-bacno');
  var bankHtml=bacno?'<div class="q-cond-item">กรุณาโอนเงินเข้าบัญชี : '+esc(bank)+' ชื่อบัญชี : '+esc(bacname)+' เลขที่บัญชี : '+esc(bacno)+' เท่านั้น</div>':'';
  var bname=g('f-bname'),baddr=g('f-baddr');
  document.getElementById('doc').innerHTML=
    '<div class="q-wrap">'+
    '<div class="q-co"><div class="q-co-name">'+esc(cname)+'</div>'+
    '<div class="q-co-addr">'+esc(g('f-caddr')).replace(/\n/g,' ')+(g('f-ctel')?'<br>M. '+esc(g('f-ctel')):'')+'</div></div>'+
    '<div class="q-divider"></div>'+
    (dateThai?'<div class="q-date">'+dateThai+'</div>':'')+
    '<div class="q-to">เรียน '+esc(bname||(baddr?baddr.split('\n')[0]:'ลูกค้า'))+(baddr?' ('+esc(baddr.replace(/\n/g,' '))+')'+'':'')+'</div>'+
    '<div class="q-sub">เรื่อง ใบเสนอราคา</div>'+
    '<div class="q-intro">ทางร้านฯ ขอเสนอราคา ดังมีรายการต่อไปนี้.-</div>'+
    rows+
    '<div class="q-total-line"><span>รวมเป็นเงิน</span><span>'+fmt(t.grand)+'.00 บาท</span></div>'+
    '<div class="q-words">('+bahtText(t.grand)+')</div>'+
    '<div style="font-size:14px;margin-bottom:10px">จึงเรียนมาเพื่อทราบ</div>'+
    (condHtml||bankHtml?'<div class="q-conds"><div class="q-cond-title">เงื่อนไขการชำระเงิน</div>'+condHtml+bankHtml+'</div>':'')+
    '<div class="q-closing">ขอแสดงความนับถือ</div>'+
    '<div class="q-sig"><div class="q-sig-line"></div>'+
    '<div class="q-sig-name">('+esc(g('f-sig')||'.....................................')+')</div></div>'+
    '</div>';
}

function renderIV(t){
  var cname=g('f-cname')||'ชื่อบริษัท';
  var typeLines='';
  if(chk('ck-r'))typeLines+='ต้นฉบับใบเสร็จรับเงิน<br>';
  if(chk('ck-t'))typeLines+='ต้นฉบับใบกำกับภาษี<br>';
  if(chk('ck-d'))typeLines+='ต้นฉบับใบส่งของ<br>';
  if(!typeLines)typeLines=(dtype==='receipt'?'ใบเสร็จรับเงิน':'ใบกำกับภาษี')+'<br>';
  var rows='';
  items.forEach(function(it,i){
    var tot=(+it.q||0)*(+it.u||0);
    rows+='<tr><td class="c">'+(i+1)+'</td><td>'+esc(it.d)+'</td><td class="c">'+fmt(it.q)+'</td><td class="r">'+fmt(it.u)+'</td><td class="r">'+fmt(tot)+'</td></tr>';
  });
  var pad=Math.max(0,8-items.length);
  for(var i=0;i<pad;i++)rows+='<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td></tr>';
  var remHtml='';
  if(remarks.length>0){remHtml='<div class="iv-rem"><div class="iv-rem-title">หมายเหตุ</div>';remarks.forEach(function(r,i){if(r)remHtml+='<div>('+(i+1)+') '+esc(r)+'</div>';});remHtml+='</div>';}
  document.getElementById('doc').innerHTML=
    '<div class="iv-wrap">'+
    '<div class="iv-hdr">'+
      '<div><div class="iv-co-name">'+esc(cname)+'</div>'+
      (g('f-cen')?'<div class="iv-co-en">'+esc(g('f-cen'))+'</div>':'')+
      '<div class="iv-co-addr">'+esc(g('f-caddr')).replace(/\n/g,'<br>')+(g('f-creg')?'<br>ทะเบียนการค้า '+esc(g('f-creg')):'')+(g('f-ctel')?'<br>โทร : '+esc(g('f-ctel')):'')+'</div></div>'+
      '<div><div class="iv-type-title">'+typeLines+'</div>'+
      '<div class="iv-ref">เล่มที่ '+(g('f-docbook')||'–')+' เลขที่ '+(g('f-docno')||'–')+'</div></div>'+

// ── ITEMS ──
function renderItems(){
  document.getElementById('items-wrap').innerHTML=items.map(function(it,i){
    return '<div class="ir">'+
      '<span class="seq">'+(i+1)+'</span>'+
      '<input type="text" value="'+esc(it.d)+'" placeholder="รายการ" oninput="items['+i+'].d=this.value;render()">'+
      '<input type="number" value="'+it.q+'" min="0" oninput="items['+i+'].q=this.value;render()">'+
      '<input type="number" value="'+it.u+'" min="0" placeholder="0.00" oninput="items['+i+'].u=this.value;render()">'+
      '<button class="xbtn" onclick="delItem('+i+')">x</button>'+
    '</div>';
  }).join('');
}
function addItem(){items.push({d:'',q:1,u:0});renderItems();render();}
function delItem(i){if(items.length<2){toast('ต้องมีอย่างน้อย 1 รายการ','err');return;}items.splice(i,1);renderItems();render();}

// ── CONDITIONS ──
function renderConds(){
  var el=document.getElementById('cond-list');if(!el)return;
  el.innerHTML=conds.map(function(c,i){
    return '<div class="cond-row">'+
      '<span style="font-size:12px;color:var(--tx2);min-width:18px;flex-shrink:0">'+(i+1)+'.</span>'+
      '<input type="text" value="'+esc(c)+'" oninput="conds['+i+']=this.value;render()">'+
      '<button class="cond-del" onclick="delCond('+i+')">x</button>'+
    '</div>';
  }).join('');
}
function addCond(){conds.push('');renderConds();render();}
function delCond(i){conds.splice(i,1);renderConds();render();}

// ── REMARKS ──
function renderRemarks(){
  var el=document.getElementById('remark-list');if(!el)return;
  el.innerHTML=remarks.map(function(r,i){
    return '<div class="cond-row">'+
      '<span style="font-size:12px;color:var(--tx2);min-width:22px;flex-shrink:0">('+(i+1)+')</span>'+
      '<input type="text" value="'+esc(r)+'" oninput="remarks['+i+']=this.value;render()">'+
      '<button class="cond-del" onclick="delRemark('+i+')">x</button>'+
    '</div>';
  }).join('');
}
function addRemark(){remarks.push('');renderRemarks();render();}
function delRemark(i){remarks.splice(i,1);renderRemarks();render();}

// ── SAVE / LOAD ──
function getData(){
  var t=calc();
  return {
    dtype:dtype,items:JSON.parse(JSON.stringify(items)),
    conds:conds.slice(),remarks:remarks.slice(),
    grand:t.grand,
    f:{cname:g('f-cname'),cen:g('f-cen'),caddr:g('f-caddr'),ctel:g('f-ctel'),
       ctax:g('f-ctax'),creg:g('f-creg'),docno:g('f-docno'),docbook:g('f-docbook'),
       date:g('f-date'),due:g('f-due'),term:g('f-term'),
       bname:g('f-bname'),baddr:g('f-baddr'),btax:g('f-btax'),
       disc:g('f-disc'),dtyp:g('f-dtyp'),vat:g('f-vat'),sig:g('f-sig'),
       bank:g('f-bank'),bacname:g('f-bacname'),bacno:g('f-bacno'),
       ckr:chk('ck-r'),ckt:chk('ck-t'),ckd:chk('ck-d')}
  };
}

function setData(data){
  dtype=data.dtype||'quotation';
  items=data.items||[{d:'',q:1,u:0}];
  conds=data.conds||[];
  remarks=data.remarks||[];
  setEditorType(dtype);
  var f=data.f||{};
  var map={cname:'f-cname',cen:'f-cen',caddr:'f-caddr',ctel:'f-ctel',ctax:'f-ctax',
           creg:'f-creg',docno:'f-docno',docbook:'f-docbook',date:'f-date',due:'f-due',
           term:'f-term',bname:'f-bname',baddr:'f-baddr',btax:'f-btax',
           disc:'f-disc',dtyp:'f-dtyp',vat:'f-vat',sig:'f-sig',
           bank:'f-bank',bacname:'f-bacname',bacno:'f-bacno'};
  Object.keys(map).forEach(function(k){var el=document.getElementById(map[k]);if(el&&f[k]!==undefined)el.value=f[k];});
  var ckr=document.getElementById('ck-r');if(ckr)ckr.checked=f.ckr!==false;
  var ckt=document.getElementById('ck-t');if(ckt)ckt.checked=f.ckt!==false;
  var ckd=document.getElementById('ck-d');if(ckd)ckd.checked=!!f.ckd;
  renderItems();renderConds();renderRemarks();render();
}

function saveDoc(){
  var data=getData();
  var t=calc();
  var name=g('f-docno')||g('f-cname')||'ไม่มีชื่อ';
  var docs=getDocs();
  var idx=docs.findIndex(function(d){return d.id===currentDocId;});
  var entry={
    id:currentDocId||('d'+Date.now()),
    name:name,dtype:dtype,
    customer:g('f-bname')||'',
    grand:t.grand,
    at:new Date().toISOString(),
    data:data
  };
  if(idx>=0)docs[idx]=entry;
  else{docs.unshift(entry);currentDocId=entry.id;}
  saveDocs(docs);
  toast('✅ บันทึกแล้ว: '+name,'ok');
}

// ── EXPORT ──
function loadScript(src,cb){var s=document.createElement('script');s.src=src;s.onload=cb;s.onerror=function(){toast('❌ โหลด library ไม่ได้ (ต้องต่อเน็ต)','err');};document.head.appendChild(s);}

function saveToDevice(){
  toast('⏳ กำลังสร้าง PDF เพื่อบันทึกลงเครื่อง…','');
  function go(){
    html2canvas(document.getElementById('doc'),{scale:2,backgroundColor:'#fff',logging:false}).then(function(c){
      var P=window.jspdf.jsPDF;
      var pdf=new P({orientation:'portrait',unit:'mm',format:'a4'});
      var pageW=210,pageH=297,margin=10,imgW=pageW-margin*2;
      var pxPerMm=c.width/imgW;
      var sliceH=Math.floor((pageH-margin*2)*pxPerMm);
      var y=0,page=0;
      while(y<c.height){
        if(page>0)pdf.addPage();
        var slice=Math.min(sliceH,c.height-y);
        var c2=document.createElement('canvas');c2.width=c.width;c2.height=slice;
        c2.getContext('2d').drawImage(c,0,y,c.width,slice,0,0,c.width,slice);
        pdf.addImage(c2.toDataURL('image/jpeg',0.95),'JPEG',margin,margin,imgW,slice/pxPerMm);
        y+=sliceH;page++;
      }
      var name=(g('f-docno')||'document')+'.pdf';
      // On iOS: triggers share sheet → Save to Files
      var blob=pdf.output('blob');
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url;a.download=name;
      document.body.appendChild(a);a.click();
      setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
      toast('✅ PDF พร้อมแล้ว — กด "Save to Files" เพื่อบันทึกลงเครื่อง','ok');
    }).catch(function(e){toast('❌ '+e.message,'err');});
  }
  if(window.html2canvas&&window.jspdf){go();return;}
  loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js',function(){
    loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js',go);
  });
}

function exportPDF(){
  toast('⏳ กำลังสร้าง PDF…','');
  function go(){
    html2canvas(document.getElementById('doc'),{scale:2,backgroundColor:'#fff',logging:false}).then(function(c){
      var P=window.jspdf.jsPDF;
      var pdf=new P({orientation:'portrait',unit:'mm',format:'a4'});
      var pageW=210,pageH=297,margin=10,imgW=pageW-margin*2;
      var pxPerMm=c.width/imgW;
      var sliceH=Math.floor((pageH-margin*2)*pxPerMm);
      var y=0,page=0;
      while(y<c.height){
        if(page>0)pdf.addPage();
        var slice=Math.min(sliceH,c.height-y);
        var c2=document.createElement('canvas');c2.width=c.width;c2.height=slice;
        c2.getContext('2d').drawImage(c,0,y,c.width,slice,0,0,c.width,slice);
        pdf.addImage(c2.toDataURL('image/jpeg',0.95),'JPEG',margin,margin,imgW,slice/pxPerMm);
        y+=sliceH;page++;
      }
      pdf.save((g('f-docno')||'doc')+'.pdf');
      toast('✅ บันทึก PDF (A4) แล้ว','ok');
    }).catch(function(e){toast('❌ '+e.message,'err');});
  }
  if(window.html2canvas&&window.jspdf){go();return;}
  loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js',function(){loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js',go);});
}

function exportJPG(){
  toast('⏳ กำลังสร้าง JPG…','');
  function go(){
    html2canvas(document.getElementById('doc'),{scale:2,backgroundColor:'#fff',logging:false}).then(function(c){
      var a4=document.createElement('canvas');a4.width=2480;a4.height=3508;
      var ctx=a4.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,2480,3508);
      ctx.drawImage(c,0,0,2480,2480*c.height/c.width);
      var a=document.createElement('a');a.href=a4.toDataURL('image/jpeg',0.95);
      a.download=(g('f-docno')||'doc')+'.jpg';a.click();
      toast('✅ บันทึก JPG (A4) แล้ว','ok');
    }).catch(function(e){toast('❌ '+e.message,'err');});
  }
  if(window.html2canvas){go();return;}
  loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js',go);
}

function doPrint(){
  toast('🖨 เปิดเมนูพิมพ์ — เลือกเครื่องพิมพ์ Bluetooth ได้เลย','ok');
  // Switch to preview on mobile before printing
  var eb=document.getElementById('editor-body');
  if(eb){eb.className='editor-body show-prev';}
  setTimeout(function(){
    window.print();
    // Restore form view after
    setTimeout(function(){
      if(eb){eb.className='editor-body show-form';}
    },1000);
  },300);
}
